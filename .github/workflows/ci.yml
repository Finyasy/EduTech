name: CI

on:
  push:
  pull_request:

jobs:
  unit-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
      - run: pnpm test:run

  db-integration:
    runs-on: ubuntu-latest
    needs: unit-and-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edutech
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edutech"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/edutech
      - run: pnpm test:db:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/edutech
          RUN_DB_INTEGRATION: "1"

  e2e-public-smoke:
    runs-on: ubuntu-latest
    needs: unit-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:public
        env:
          CI: "true"
          PLAYWRIGHT_HOST: 127.0.0.1
          NEXT_PUBLIC_CLERK_DISABLE_SOCIAL: "1"

  e2e-auth-smoke:
    if: ${{ secrets.E2E_TEACHER_EMAIL != '' && secrets.E2E_TEACHER_PASSWORD != '' }}
    runs-on: ubuntu-latest
    needs: unit-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:auth-smoke
        env:
          CI: "true"
          PLAYWRIGHT_HOST: 127.0.0.1
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_LEARNER_EMAIL: ${{ secrets.E2E_LEARNER_EMAIL }}
          E2E_LEARNER_PASSWORD: ${{ secrets.E2E_LEARNER_PASSWORD }}
